<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">

    {% seo %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">

    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
    <style>
      /* Base reset and typography */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      body {
        font-family: "Times New Roman", Times, serif;
        color: #000000;
        background-color: #ffffff80;
        margin: 0;
        padding: 0;
        font-size: 16px;
        line-height: 1.7;
      }

      /* All links are blue */
      a {
        color: #0000cc;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      /* Headings — !important to override Cayman theme green */
      h1, h2, h3, h4, h5, h6 {
        font-family: "Times New Roman", Times, serif !important;
        color: #000000 !important;
        font-weight: bold;
        margin-top: 1.4em;
        margin-bottom: 0.4em;
      }

      /* Section break: grey bar above h2 */
      h2 {
        border-top: 1px solid #d0d0d0;
        padding-top: 0.9em;
        margin-top: 2em;
      }

      /* First h2 on a page doesn't need a top bar */
      h2:first-of-type {
        border-top: none;
        padding-top: 0;
        margin-top: 1.4em;
      }

      /* Style <hr> as a light grey bar */
      hr {
        border: none;
        border-top: 1px solid #d0d0d0;
        margin: 2em 0;
      }

      /* Override Cayman theme page-header */
      .page-header {
        display: none;
      }

      /* Navigation bar */
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 48px;
        background-color: #ffffff00;
        border-bottom: 1px solid #cccccc;
        font-family: "Times New Roman", Times, serif;
      }

      .top-bar .site-name {
        font-size: 1.15em;
        font-weight: bold;
        color: #000000;
        letter-spacing: 0.01em;
      }

      .top-bar nav a {
        color: #0000cc;
        text-decoration: none;
        margin-left: 32px;
        font-size: 1em;
      }

      .top-bar nav a:hover {
        text-decoration: underline;
      }

      /* Main content area */
      main {
        padding: 48px 24px;
        max-width: 860px;
        margin: 0 auto;
        font-family: "Times New Roman", Times, serif;
        color: #000000;
      }

      /* Footer */
      .site-footer {
        font-family: "Times New Roman", Times, serif;
        color: #000000;
        border-top: 1px solid #cccccc;
        padding-top: 20px;
        margin-top: 60px;
        text-align: center;
        font-size: 0.9em;
      }

      .site-footer a {
        color: #0000cc;
      }

      /* Skip to content */
      #skip-to-content {
        position: absolute;
        left: -9999px;
      }

      #skip-to-content:focus {
        left: 0;
        top: 0;
        padding: 4px 8px;
        background: #ffffff;
        color: #0000cc;
        border: 1px solid #0000cc;
        z-index: 1000;
      }
    </style>
  </head>

  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>

    <header class="top-bar" role="banner">
      <div class="site-name">{{ site.title | default: "Theodossios Drossidis" }}</div>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about.html' | relative_url }}">About</a>
        <a href="{{ '/CV.html' | relative_url }}">CV</a>
        <a href="{{ '/research.html' | relative_url }}">Research</a>
      </nav>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        <p>© 2025 Theodossios Drossidis &middot;
          <a href="mailto:theo.drossidis@gmail.com">theo.drossidis@gmail.com</a>
        </p>
        <p>
          <a href="https://github.com/yourusername" target="_blank" style="margin-right: 10px;">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub" style="width: 20px; vertical-align: middle;">
          </a>
          <a href="https://www.linkedin.com/in/theo-drossidis-5625121ba" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg" alt="LinkedIn" style="width: 20px; vertical-align: middle;">
          </a>
        </p>
      </footer>
    </main>
  </body>
</html>
